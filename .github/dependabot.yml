version: 2

updates:
  # ── GitHub Actions ─────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels:
      - dependencies
      - github-actions

  # ── Backend Python ─────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels:
      - dependencies
      - python
    # Only open PRs for security updates on transitive deps — direct deps
    # are pinned in requirements.txt and should be updated intentionally.
    open-pull-requests-limit: 5

  # ── Web (Next.js) ──────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 5
    ignore:
      # Next.js major versions require manual testing
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]

  # ── Mobile (Expo) ──────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 5
    ignore:
      # Expo SDK major bumps require manual migration
      - dependency-name: expo
        update-types: ["version-update:semver-major"]

  # ── Desktop (Rust / Cargo) ─────────────────────────────────────────
  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 3
