name: cron · digest email

# 06:15 UTC daily — 15 minutes after the fetch so the freshest jobs land in the email.
on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: POST /internal/digest/run (hour=6 bucket)
        env:
          API_URL: ${{ secrets.API_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST "$API_URL/internal/digest/run" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Secret: $INTERNAL_SECRET" \
            -d '{"digest_hour_utc": 6}' \
            --retry 3 --retry-delay 30 --max-time 300 \
            -w "\nHTTP %{http_code}\n"
