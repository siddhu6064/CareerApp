# Render Blueprint — `render up` deploys the backend.
# https://render.com/docs/blueprint-spec
#
# Connects the Dockerfile, sets envs, exposes health check, persists nothing
# (state lives in Supabase + R2 in SaaS mode).

services:
  - type: web
    name: appname-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter           # $7/mo · 512 MB · enough for early traffic
    region: oregon          # match Supabase region for low latency
    healthCheckPath: /health
    envVars:
      - key: APPNAME_MODE
        value: saas
      - key: APPNAME_WORKERS
        value: "2"
      - key: ANTHROPIC_API_KEY
        sync: false         # set in dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: JSEARCH_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: INTERNAL_SECRET
        generateValue: true   # used by GitHub Actions cron (PRD §13)
